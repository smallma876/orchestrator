# Nginx de borde (edge): es el único punto de entrada que ve el
# navegador. Sirve el shell (SPA) y hace de reverse proxy hacia los
# microfrontends internos por prefijo de path, así todo comparte un
# mismo origen aunque cada microfrontend viva en su propio contenedor.

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # microfrontend-one vive en su propio contenedor/servicio Docker,
    # resuelto por nombre vía la red interna de docker-compose.
    location /microfrontend-one/ {
        proxy_pass http://microfrontend-one:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Plantilla para cuando agregues otro microfrontend (ej. microfrontend-two):
    # location /microfrontend-two/ {
    #     proxy_pass http://microfrontend-two:80;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # Shell: cualquier ruta que no matcheó un microfrontend cae en
    # index.html (client-side routing de React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
}
